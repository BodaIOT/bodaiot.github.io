<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirect</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background: linear-gradient(135deg, #3a3a3a, #1a1a1a);
        color: #fff;
        font-family: Arial, sans-serif;
        font-size: 24px;
      }

      #loadingGif {
        width: 80px;
        height: auto;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <img id="loadingGif" src="./loading.gif" alt="" />
    <div id="loadingText">Загрузка...</div>

    <script>
      console.log("[Redirect] Страница загружена, адрес: " + window.location.href);
      console.log("[Redirect] Жду 3 секунды перед проверкой параметра url_redirect...");

      setTimeout(function () {
        const urlParams = new URLSearchParams(window.location.search);
        const redirectUrl = urlParams.get("url_redirect");

        console.log("[Redirect] Проверка параметров завершена. Значение url_redirect: " + redirectUrl);

        if (!redirectUrl) {
          console.log("[Redirect] Параметр url_redirect не найден — ничего не делаю");
          return;
        }

        console.log("[Redirect] Пытаюсь открыть новое окно: " + redirectUrl);

        const newWindow = window.open(redirectUrl, "_blank");

        if (!newWindow) {
          console.error("[Redirect] Не удалось открыть окно — вероятно, браузер заблокировал всплывающее окно (popup blocked), так как открытие произошло не по прямому действию пользователя");
        } else {
          console.log("[Redirect] Окно успешно открыто: " + redirectUrl);
        }
      }, 3000);
    </script>
  </body>
</html>
